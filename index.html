<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlassPools • True Profitability</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); }
    .widget { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .widget:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- NAV -->
    <nav class="flex justify-between items-center mb-12">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-2xl">🪟</div>
        <div class="title-font text-4xl font-semibold tracking-tighter">GlassPools</div>
      </div>
      <div class="flex gap-2 bg-zinc-900 rounded-3xl p-1 text-sm">
        <button onclick="switchTab(0)" class="tab-btn px-8 py-3 rounded-3xl active">Analyze</button>
        <button onclick="switchTab(1)" class="tab-btn px-8 py-3 rounded-3xl">Leaderboard</button>
      </div>
    </nav>

    <!-- SEARCH -->
    <div class="max-w-2xl mx-auto glass rounded-3xl p-2 flex items-center gap-4">
      <input id="pool-address" type="text" placeholder="Paste pool address (0x...)" class="flex-1 bg-transparent px-8 py-6 text-xl outline-none">
      <button onclick="analyzePool()" class="bg-white text-black px-12 py-6 rounded-3xl font-semibold">Analyze</button>
    </div>

    <!-- CHAIN BADGE (moved outside search, right side) -->
    <div class="flex justify-end mt-4">
      <div id="chain-badge" class="glass px-6 py-3 rounded-3xl text-sm font-medium flex items-center gap-2">
        <span class="text-cyan-400">CHAIN:</span> <span id="detected-chain">Auto</span>
      </div>
    </div>

    <div id="results" class="hidden mt-16">
      <!-- RECTANGULAR PAIR BOX (like VFat) -->
      <div class="glass rounded-3xl p-8 flex items-center justify-between">
        <div>
          <div id="pool-name" class="title-font text-5xl font-semibold"></div>
          <div id="dex-info" class="text-zinc-400 text-sm mt-1"></div>
        </div>
        <div id="token-symbols" class="flex gap-4 text-4xl font-bold"></div>
      </div>

      <!-- TIME SELECTORS -->
      <div class="flex justify-center gap-2 mt-8 bg-zinc-900 rounded-3xl p-1 w-fit mx-auto">
        <button onclick="setPeriod(0)" class="time-btn px-8 py-3 rounded-3xl active">24H</button>
        <button onclick="setPeriod(1)" class="time-btn px-8 py-3 rounded-3xl">48H</button>
        <button onclick="setPeriod(2)" class="time-btn px-8 py-3 rounded-3xl">7D</button>
        <button onclick="setPeriod(3)" class="time-btn px-8 py-3 rounded-3xl">30D</button>
        <button onclick="setPeriod(4)" class="time-btn px-8 py-3 rounded-3xl">90D</button>
      </div>

      <!-- WIDGETS -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-12">
        <div class="glass widget rounded-3xl p-8">
          <div class="text-zinc-400 text-xs">TOTAL TVL</div>
          <div id="total-tvl" class="text-5xl font-semibold mt-3"></div>
        </div>
        <div class="glass widget rounded-3xl p-8">
          <div class="text-zinc-400 text-xs">VOLUME</div>
          <div id="volume-period" class="text-5xl font-semibold mt-3 text-emerald-400"></div>
        </div>
        <div class="glass widget rounded-3xl p-8">
          <div class="text-zinc-400 text-xs">EST. YIELD</div>
          <div id="yield" class="text-5xl font-semibold mt-3 text-violet-400"></div>
        </div>
      </div>

      <!-- VOLUME GRAPH -->
      <div class="glass rounded-3xl p-8 mt-8">
        <div class="text-sm text-zinc-400 mb-4">VOLUME TREND</div>
        <canvas id="volume-chart" height="160"></canvas>
      </div>

      <!-- GRADE BOX (bottom) -->
      <div class="glass rounded-3xl p-10 mt-12 border border-emerald-400/30">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-5xl font-bold text-emerald-400" id="grade">A+</div>
            <div class="text-6xl font-bold" id="score">92</div>
          </div>
          <div class="text-right max-w-xs">
            <div id="grade-explain" class="text-lg"></div>
            <div class="mt-6 text-sm text-zinc-400">
              Est. fees: <span id="fees-24h" class="text-emerald-400"></span> (24h) • 
              <span id="fees-7d" class="text-emerald-400"></span> (7d) • 
              <span id="fees-30d" class="text-emerald-400"></span> (30d)
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentPair = null;
    let volumeChart = null;

    async function analyzePool() {
      const address = document.getElementById("pool-address").value.trim().toLowerCase();
      if (!address) return alert("Paste pool address");

      document.getElementById("results").classList.add("hidden");

      const res = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${address}`);
      const data = await res.json();
      const pair = data.pairs ? data.pairs[0] : null;
      if (!pair) return alert("Pool not found");

      currentPair = pair;

      // Fill pair box
      document.getElementById("pool-name").textContent = `${pair.baseToken.symbol}/${pair.quoteToken.symbol}`;
      document.getElementById("dex-info").innerHTML = `${pair.chainId.toUpperCase()} • ${pair.dexId} • Pool ${pair.pairAddress.slice(0,8)}...`;
      document.getElementById("token-symbols").innerHTML = `${pair.baseToken.symbol} <span class="text-cyan-400">/</span> ${pair.quoteToken.symbol}`;
      document.getElementById("detected-chain").textContent = pair.chainId.toUpperCase();

      // Data
      document.getElementById("total-tvl").textContent = `$${(pair.liquidity.usd/1e6).toFixed(1)}M`;
      document.getElementById("volume-period").textContent = `$${(pair.volume.h24/1e6).toFixed(1)}M`;
      document.getElementById("yield").textContent = `${(pair.volume.h24 / pair.liquidity.usd * 100).toFixed(1)}%`;

      // Grade
      const score = Math.min(98, Math.floor((pair.volume.h24 / pair.liquidity.usd * 100) + 50));
      const grade = score > 90 ? "A+" : score > 80 ? "A" : score > 70 ? "B" : "C";
      document.getElementById("grade").textContent = grade;
      document.getElementById("score").textContent = score;
      document.getElementById("grade-explain").textContent = `Strong volume and liquidity. Capital efficient. Recommended for tight-range LP.`;
      document.getElementById("fees-24h").textContent = `$${(pair.volume.h24 * 0.003).toFixed(0)}`;
      document.getElementById("fees-7d").textContent = `$${(pair.volume.h24 * 0.003 * 7).toFixed(0)}`;
      document.getElementById("fees-30d").textContent = `$${(pair.volume.h24 * 0.003 * 30).toFixed(0)}`;

      document.getElementById("results").classList.remove("hidden");
      renderVolumeChart();
    }

    function renderVolumeChart() {
      const ctx = document.getElementById("volume-chart");
      if (volumeChart) volumeChart.destroy();
      volumeChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: ['24H','48H','7D','30D','90D'], datasets: [{ label: 'Volume', data: [120, 95, 650, 2100, 5800], backgroundColor: '#22d3ee' }] },
        options: { scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
      });
    }

    function setPeriod(n) {
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      // Real app would update chart data here
      renderVolumeChart(); // refreshes with same data for MVP
    }

    function switchTab(n) { alert("Leaderboard coming next"); }

    window.onload = () => document.getElementById("pool-address").value = "0x6c561b446416e1a00e8e93e221854d6ea4171372";
  </script>
</body>
</html>
