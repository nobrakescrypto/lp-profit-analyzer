<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlassPools • True Profitability</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); }
    .widget { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .widget:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <nav class="flex justify-between items-center mb-12">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-2xl">🪟</div>
        <div class="title-font text-4xl font-semibold tracking-tighter">GlassPools</div>
      </div>
      <div class="flex gap-2 bg-zinc-900 rounded-3xl p-1 text-sm">
        <button onclick="switchTab(0)" class="tab-btn px-8 py-3 rounded-3xl active">Analyze</button>
        <button onclick="switchTab(1)" class="tab-btn px-8 py-3 rounded-3xl">Leaderboard</button>
      </div>
    </nav>

    <div class="text-center mb-12">
      <h1 class="title-font text-7xl font-semibold tracking-tighter">Find True Profitability</h1>
    </div>

    <div class="max-w-2xl mx-auto glass rounded-3xl p-2 flex items-center">
      <input id="pool-address" type="text" placeholder="Paste pool address (0x...)" class="flex-1 bg-transparent px-8 py-6 text-xl outline-none">
      <select id="chain-select" class="bg-zinc-900 px-6 py-6 rounded-3xl mr-2 text-sm">
        <option value="">Auto Detect</option>
        <option value="base">Base</option>
        <option value="ethereum">Ethereum</option>
        <option value="arbitrum">Arbitrum</option>
        <option value="solana">Solana</option>
        <option value="bsc">BSC</option>
        <option value="polygon">Polygon</option>
        <option value="optimism">Optimism</option>
        <option value="avalanche">Avalanche</option>
        <option value="fantom">Fantom</option>
        <option value="zksync">zkSync</option>
        <option value="linea">Linea</option>
        <option value="blast">Blast</option>
        <option value="mantle">Mantle</option>
        <option value="scroll">Scroll</option>
        <option value="cronos">Cronos</option>
        <option value="gnosis">Gnosis</option>
        <option value="sei">Sei</option>
        <option value="sui">Sui</option>
        <option value="celestia">Celestia</option>
        <option value="injective">Injective</option>
      </select>
      <button onclick="analyzePool()" class="bg-white text-black px-12 py-6 rounded-3xl font-semibold">Analyze</button>
    </div>

    <div id="results" class="hidden mt-16">
      <!-- Header -->
      <div class="flex justify-between items-end mb-12">
        <div>
          <div id="pool-name" class="title-font text-6xl font-semibold"></div>
          <div id="pool-chain" class="text-cyan-400 text-sm font-medium mt-1"></div>
        </div>
        <div class="text-right">
          <div id="current-price" class="text-6xl font-bold"></div>
          <div id="price-change" class="text-emerald-400 text-sm"></div>
        </div>
      </div>

      <!-- Widgets -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="glass widget rounded-3xl p-8">
          <div class="text-zinc-400 text-xs">TOTAL TVL</div>
          <div id="total-tvl" class="text-5xl font-semibold mt-3"></div>
        </div>
        <div class="glass widget rounded-3xl p-8">
          <div class="text-zinc-400 text-xs">24H VOLUME</div>
          <div id="volume-24h" class="text-5xl font-semibold mt-3 text-emerald-400"></div>
        </div>
        <div class="glass widget rounded-3xl p-8">
          <div class="text-zinc-400 text-xs">EST. YIELD</div>
          <div id="yield" class="text-5xl font-semibold mt-3 text-violet-400"></div>
        </div>
      </div>

      <!-- CoinGecko & CoinGlass -->
      <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass rounded-3xl p-8">
          <div class="text-xs text-zinc-400 mb-2">COINGECKO MARKET DATA</div>
          <div id="coingecko-info" class="text-sm"></div>
        </div>
        <div class="glass rounded-3xl p-8">
          <div class="text-xs text-zinc-400 mb-2">COINGLASS FUTURES OI <span class="text-[10px]">(add your key below)</span></div>
          <input id="coinglass-key" type="text" placeholder="Paste CoinGlass API key" class="w-full bg-zinc-900 rounded-2xl px-4 py-3 text-sm mb-4">
          <button onclick="fetchCoinGlass()" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-6 py-2 rounded-2xl">Load OI</button>
          <div id="coinglass-info" class="mt-4 text-sm text-emerald-400"></div>
        </div>
      </div>

      <!-- Chart -->
      <div class="glass rounded-3xl p-8 mt-8">
        <canvas id="trend-chart" height="160"></canvas>
      </div>
    </div>
  </div>

  <script>
    let currentPair = null;
    let chartInstance = null;

    async function analyzePool() {
      const address = document.getElementById("pool-address").value.trim().toLowerCase();
      if (!address) return alert("Paste a pool address");

      document.getElementById("results").classList.add("hidden");

      // AUTO CHAIN DETECTION + LIVE DATA via DexScreener
      const searchRes = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${address}`);
      const data = await searchRes.json();
      const pair = data.pairs ? data.pairs[0] : null;
      if (!pair) return alert("Pool not found — try another address");

      currentPair = pair;

      // Fill UI
      document.getElementById("pool-name").textContent = `${pair.baseToken.symbol}/${pair.quoteToken.symbol}`;
      document.getElementById("pool-chain").textContent = pair.chainId.toUpperCase();
      document.getElementById("current-price").textContent = `$${parseFloat(pair.priceUsd).toFixed(4)}`;
      document.getElementById("price-change").innerHTML = `${pair.priceChange.h24 > 0 ? '+' : ''}${pair.priceChange.h24}% 24h`;
      document.getElementById("total-tvl").textContent = `$${(pair.liquidity.usd / 1e6).toFixed(1)}M`;
      document.getElementById("volume-24h").textContent = `$${(pair.volume.h24 / 1e6).toFixed(1)}M`;
      document.getElementById("yield").textContent = `${(pair.volume.h24 / pair.liquidity.usd * 100).toFixed(1)}% est.`;

      // CoinGecko quick price
      const cgRes = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${pair.baseToken.symbol.toLowerCase()}&vs_currencies=usd`);
      const cgData = await cgRes.json();
      document.getElementById("coingecko-info").innerHTML = `CoinGecko ${pair.baseToken.symbol}: $${cgData[pair.baseToken.symbol.toLowerCase()]?.usd || 'N/A'}`;

      document.getElementById("results").classList.remove("hidden");

      // Simple trend chart
      renderSimpleChart();
    }

    function renderSimpleChart() {
      const ctx = document.getElementById("trend-chart");
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['6h','12h','18h','24h'],
          datasets: [{ label: 'Price Trend', data: [98, 102, 99.5, 101], borderColor: '#22d3ee', tension: 0.4 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
      });
    }

    async function fetchCoinGlass() {
      const key = document.getElementById("coinglass-key").value.trim();
      if (!key) return alert("Paste your CoinGlass API key");
      // Example CoinGlass call (replace with your real endpoint)
      const res = await fetch("https://open-api-v4.coinglass.com/api/futures/open-interest/aggregated-history?symbol=BTC", {
        headers: { "Authorization": `Bearer ${key}` }
      });
      const data = await res.json();
      document.getElementById("coinglass-info").textContent = `BTC OI: $${data?.data?.[0]?.openInterest || 'Loaded'}`;
    }

    function switchTab(n) { alert("Leaderboard coming next update"); }

    // Auto-fill demo
    window.onload = () => document.getElementById("pool-address").value = "0x6c561b446416e1a00e8e93e221854d6ea4171372";
  </script>
</body>
</html>
