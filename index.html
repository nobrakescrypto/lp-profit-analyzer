<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoolForge • True Profitability</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); }
    .widget { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .widget:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-x-hidden">
  <div class="max-w-7xl mx-auto px-6">
    <!-- Sleek nav -->
    <nav class="flex items-center justify-between py-8">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-xl">🔥</div>
        <div class="title-font text-3xl font-semibold tracking-tighter">PoolForge</div>
      </div>
      <div class="flex gap-2 bg-zinc-900/80 backdrop-blur-xl rounded-3xl p-1">
        <button onclick="switchTab(0)" class="tab-btn px-8 py-3 rounded-3xl font-medium active">Analyze</button>
        <button onclick="switchTab(1)" class="tab-btn px-8 py-3 rounded-3xl font-medium">Leaderboard</button>
        <button onclick="switchTab(2)" class="tab-btn px-8 py-3 rounded-3xl font-medium">Compare</button>
      </div>
    </nav>

    <!-- Hero -->
    <div class="text-center pt-12 pb-20">
      <h1 class="title-font text-7xl font-semibold tracking-tighter leading-none">Find True<br>Profitability</h1>
      <p class="mt-6 text-xl text-zinc-400">Live multi-source data • Apple-grade widgets</p>
    </div>

    <!-- Search -->
    <div class="max-w-2xl mx-auto">
      <div class="glass rounded-3xl p-2 flex items-center">
        <input id="pool-address" type="text" placeholder="0x... Pool address" class="flex-1 bg-transparent px-8 py-6 text-xl outline-none">
        <select id="chain-select" class="bg-zinc-900 text-sm px-6 py-6 rounded-3xl mr-2">
          <option value="base">Base</option>
          <option value="ethereum">Ethereum</option>
        </select>
        <button onclick="analyzePool()" class="bg-white text-black px-12 py-6 rounded-3xl font-semibold hover:bg-cyan-400 transition">Analyze</button>
      </div>
    </div>

    <!-- Results (Apple widget style) -->
    <div id="results" class="hidden mt-20">
      <div class="flex justify-between items-start mb-12">
        <div>
          <div id="pool-name" class="title-font text-6xl font-semibold"></div>
          <div id="pool-address-display" class="font-mono text-zinc-500 text-sm"></div>
        </div>
        <div class="text-right">
          <div id="current-price" class="text-6xl font-bold text-cyan-400"></div>
          <div class="text-emerald-400 text-sm">+<span id="price-change"></span>% 24h</div>
        </div>
      </div>

      <!-- Widget grid -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="glass widget rounded-3xl p-8">
          <div class="text-zinc-400 text-sm">TOTAL TVL</div>
          <div id="total-tvl" class="text-5xl font-semibold mt-4"></div>
        </div>
        <div class="glass widget rounded-3xl p-8">
          <div class="text-zinc-400 text-sm">24H VOLUME</div>
          <div id="volume-24h" class="text-5xl font-semibold mt-4 text-emerald-400"></div>
        </div>
        <div class="glass widget rounded-3xl p-8">
          <div class="text-zinc-400 text-sm">ANNUALIZED YIELD</div>
          <div id="yield" class="text-5xl font-semibold mt-4 text-violet-400"></div>
        </div>
      </div>

      <!-- Charts + Simulator -->
      <div class="mt-16 grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="glass widget rounded-3xl p-8">
          <canvas id="volume-chart" height="180"></canvas>
        </div>
        <div class="glass widget rounded-3xl p-8">
          <div class="mb-6">LP Earnings Simulator</div>
          <input id="deposit" type="number" value="10000" class="w-full bg-zinc-900 rounded-2xl px-6 py-4">
          <button onclick="simulateEarnings()" class="mt-6 w-full bg-gradient-to-r from-cyan-400 to-violet-500 py-5 rounded-2xl font-semibold">Calculate Returns</button>
          <div id="sim-result" class="mt-6 text-emerald-400"></div>
        </div>
      </div>

      <div id="analysis-text" class="mt-12 glass rounded-3xl p-10 text-lg"></div>
    </div>
  </div>

  <script>
    let currentData = null;
    let charts = {};

    async function analyzePool() {
      const address = document.getElementById("pool-address").value.trim();
      const chain = document.getElementById("chain-select").value;
      if (!address) return alert("Paste pool address");

      document.getElementById("results").classList.add("hidden");

      // DexScreener (fast, accurate price/TVL/volume/fluctuations)
      const dexRes = await fetch(`https://api.dexscreener.com/latest/dex/pairs/${chain}/${address}`);
      const dexData = await dexRes.json();
      const pair = dexData.pairs?.[0] || dexData.pair;
      if (!pair) return alert("Pool not found on " + chain);

      // The Graph for fees + history (Base only for MVP)
      let fees7d = 0, days = [];
      if (chain === "base") {
        const graphRes = await fetch("https://api.thegraph.com/subgraphs/name/ianlapham/uniswap-v3-base", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ query: `{ pool(id:"${address.toLowerCase()}") { totalValueLockedUSD } poolDayDatas(first:7, orderBy:date, orderDirection:desc) { volumeUSD feesUSD } }` })
        });
        const graph = await graphRes.json();
        days = graph.data.poolDayDatas || [];
        fees7d = days.reduce((sum, d) => sum + parseFloat(d.feesUSD || 0), 0);
      }

      // Merge data
      currentData = {
        name: `${pair.baseToken.symbol}/${pair.quoteToken.symbol}`,
        address: pair.pairAddress,
        price: parseFloat(pair.priceUsd).toFixed(2),
        priceChange: parseFloat(pair.priceChange.h24 || 0).toFixed(1),
        tvl: `$${(parseFloat(pair.liquidity.usd)/1e6).toFixed(1)}M`,
        volume: `$${(parseFloat(pair.volume.h24)/1e6).toFixed(1)}M`,
        yield: ((fees7d / parseFloat(pair.liquidity.usd || 1) * 365 / 7) * 100).toFixed(1) + "%"
      };

      // Populate UI
      document.getElementById("pool-name").textContent = currentData.name;
      document.getElementById("pool-address-display").textContent = currentData.address.slice(0,10) + "...";
      document.getElementById("current-price").textContent = "$" + currentData.price;
      document.getElementById("price-change").textContent = currentData.priceChange;
      document.getElementById("total-tvl").textContent = currentData.tvl;
      document.getElementById("volume-24h").textContent = currentData.volume;
      document.getElementById("yield").textContent = currentData.yield;

      document.getElementById("analysis-text").innerHTML = `Excellent pool. ${currentData.yield} annualized yield with strong 24h volume. Recommended for tight-range LP.`;

      document.getElementById("results").classList.remove("hidden");
      window.scrollTo({top: 800, behavior: "smooth"});
    }

    function simulateEarnings() {
      const deposit = parseFloat(document.getElementById("deposit").value);
      const yieldPct = parseFloat(document.getElementById("yield").textContent);
      const est = (deposit * yieldPct / 100).toFixed(0);
      document.getElementById("sim-result").innerHTML = `Estimated yearly earnings: <span class="text-3xl font-bold">$${est}</span>`;
    }

    function switchTab(n) { alert("Tab " + n + " coming next update"); }

    // Auto example
    window.onload = () => {
      document.getElementById("pool-address").value = "0x6c561b446416e1a00e8e93e221854d6ea4171372";
    };
  </script>
</body>
</html>
